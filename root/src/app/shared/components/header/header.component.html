<p-menubar [model]="items" styleClass="rounded-none border-x-0 border-t-0 px-4 py-2">
  <ng-template #start>
    <div class="mr-6 flex items-center gap-2">
      <app-drawer />
      <a
        routerLink="/"
        class="flex items-center gap-2 text-lg font-bold no-underline text-color"
      >
        <span>🧩</span>
        <span>Microfrontends App</span>
      </a>
    </div>
  </ng-template>

  <ng-template #end>
    <p-button
      [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      severity="secondary"
      [text]="true"
      [rounded]="true"
      (onClick)="toggleDarkMode()"
      ariaLabel="Cambiar tema claro/oscuro"
    />
  </ng-template>
</p-menubar>
