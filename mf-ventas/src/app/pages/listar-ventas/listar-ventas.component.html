<div class="mx-auto w-full max-w-6xl px-4 py-6">
  <h2 class="mb-6 text-2xl font-bold text-color">🧾 Listar Ventas</h2>

  <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (venta of ventas; track venta.producto) {
      <p-card styleClass="h-full overflow-hidden">
        <ng-template #header>
          <img
            src="mf-ventas/images/{{ venta.imagenUrl }}"
            [alt]="venta.producto"
            class="h-44 w-full object-cover"
          />
        </ng-template>

        <div class="flex items-start justify-between gap-2">
          <h3 class="text-lg font-semibold text-color">{{ venta.producto }}</h3>
          <p-tag [value]="venta.estado" [severity]="severidad(venta.estado)" />
        </div>

        <ul class="mt-3 space-y-1 text-sm text-muted-color">
          <li>💰 <strong class="text-color">S/ {{ venta.total | number: '1.2-2' }}</strong></li>
          <li>📆 {{ venta.cuotas }} cuotas de S/ {{ venta.montoCuota | number: '1.2-2' }}</li>
          <li>🗓 {{ venta.fecha | date }}</li>
        </ul>
      </p-card>
    }
  </div>
</div>
