<div class="mx-auto w-full max-w-5xl px-4 py-6">
  <h2 class="mb-8 text-center text-2xl font-bold text-color">🛒 Listar Compras</h2>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
    @for (curso of cursos; track curso.titulo) {
      <p-card styleClass="h-full">
        <div class="flex h-full flex-col items-center gap-4 text-center sm:flex-row sm:text-left">
          <div class="flex h-28 w-28 shrink-0 items-center justify-center rounded-lg bg-primary/5 p-3">
            <img [src]="curso.imagen" [alt]="curso.alt" class="max-h-20 max-w-full object-contain" />
          </div>
          <div>
            <h3 class="mb-2 text-lg font-semibold text-color">{{ curso.titulo }}</h3>
            <p class="text-sm text-muted-color">{{ curso.descripcion }}</p>
          </div>
        </div>
      </p-card>
    }
  </div>
</div>
